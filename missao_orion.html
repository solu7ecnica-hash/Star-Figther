<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/x-icon" href="batedor_3.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Fighter - Módulo 2: Orion (Ajustes de Míssil e Bônus)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
            display: flex;
            flex-direction: column;
        }
        canvas {
            width: 100%;
            flex-grow: 1;
            background: radial-gradient(circle at center, #0b1d3a 0%, #020813 100%);
            display: block;
        }
    </style>
</head>
<body>

<div id="container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- CARREGAMENTO DE ATIVOS SEPARADOS ---
    const imgNave = new Image(); imgNave.src = "nave.png";
    const imgBatedor = new Image(); imgBatedor.src = "batedor_3.png"; 
    const imgMissil = new Image(); imgMissil.src = "m_2.png"; 
    
    // Separação Blindada
    const imgChefeCombate = new Image(); imgChefeCombate.src = "aranha_maldita.png"; 
    const imgAranhaIntro = new Image(); imgAranhaIntro.src = "aranha_1_x.png"; 
    const imgMauroCockpit = new Image(); imgMauroCockpit.src = "Mauro_1_x.png"; 

    // --- SISTEMA DE ÁUDIO ---
    function tocarSomTiro() {
        const som = new Audio("til.mp3");
        som.volume = 0.4;
        som.play().catch(() => {});
    }

    function tocarSomExplosao() {
        const som = new Audio("bum.mp3");
        som.volume = 0.6;
        som.play().catch(() => {});
    }

    // NOVO: Som exclusivo para coleta de itens na mochila/nave
    function tocarSomBonus() {
        const som = new Audio("bonus.mp3");
        som.volume = 0.6;
        som.play().catch(() => {});
    }

    const somSuspense = new Audio("suspense.mp3");
    somSuspense.volume = 0.7;
    
    somSuspense.onended = function() {
        if (estadoJogo === "INTRO") {
            iniciarMissaoReal();
        }
    };

    function redimensionar() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    // --- MÁQUINA DE ESTADOS ---
    let estadoJogo = "INTRO";
    let faseIntro = "MAURO_ENTRANDO"; 
    let timerCinematico = 0;

    let mauroEscala = 0.05;
    let mauroRotacao = 0;
    let mauroX_Final = 0;
    let mauroY_Final = 0;

    let aranhaEscala = 0.05;
    let aranhaRotacao = 0;
    let aranhaX_Final = 0;
    let aranhaY_Final = 0;

    let audioDisparado = false;
    
    // CORREÇÃO DE SÊNIOR: Aumentado de 160 para 190 para dar margem de segurança no mobile
    let alturaPainel = 210; 

    // --- SISTEMA DE PARTÍCULAS ---
    let particulasExplosao = [];

    function criarExplosao(x, y, cor = "#ff5500", quantidade = 15) {
        for (let i = 0; i < quantidade; i++) {
            particulasExplosao.push({
                x: x,
                y: y,
                velX: (Math.random() - 0.5) * 6,
                velY: (Math.random() - 0.5) * 6,
                raio: Math.random() * 3 + 1,
                vida: Math.random() * 20 + 20,
                maxVida: 40,
                cor: cor
            });
        }
    }

    // Painel tátil mobile
    let painel = {
        btnEsq:  { x: 20,  y: 0, l: 45, a: 45 },
        btnDir:  { x: 110, y: 0, l: 45, a: 45 },
        btnCima: { x: 65,  y: 0, l: 45, a: 45 },
        btnBaixo:{ x: 65,  y: 0, l: 45, a: 45 },
        btnAtirar:{ x: 0,   y: 0, raio: 35 }
    };

    // Nave Status
    let naveLocal = {
        x: 0, y: 0, l: 45, a: 50,
        velocidade: 5,
        vida: 10, maxVida: 10,
        tipoArma: "NORMAL", 
        misseisEstocados: 0, 
        paralisadoTimer: 0, 
        movendoEsquerda: false, movendoDireita: false, movendoCima: false, movendoBaixo: false
    };

    let historicoComandos = [];
    let tempoUltimoComando = 0;

    function registrarComandoCombo(direcao) {
        const agora = Date.now();
        if (agora - tempoUltimoComando > 600) {
            historicoComandos = [];
        }
        tempoUltimoComando = agora;
        historicoComandos.push(direcao);
        
        if (historicoComandos.length >= 3) {
            const tam = historicoComandos.length;
            if (historicoComandos[tam-3] === "BAIXO" && 
                historicoComandos[tam-2] === "BAIXO" && 
                historicoComandos[tam-1] === "CIMA") {
                
                dispararMissilEstocado(); 
                historicoComandos = []; 
            }
        }
    }

    let tirosJogador = [];
    let tirosInimigos = [];
    let teiasLista = [];
    let batedoresLista = [];
    let bonusLista = [];
    let estrelasFundo = [];
    
    let batedoresAbatidos = 0;
    let metaChefe = 50; 
    let bossAtivo = false;
    let spawnTimer = 0;

    let chefaAranha = {
        x: 150, y: -120, l: 120, a: 100,
        vida: 60, maxVida: 60,
        velX: 4, velY: 1, alvoX: 150,
        mudarAlvoTimer: 0, ataqueTimer: 0, teiaTimer: 0
    };

    for (let i = 0; i < 40; i++) {
        estrelasFundo.push({ x: Math.random() * 450, y: Math.random() * 850, vel: Math.random() * 2 + 1, tamanho: Math.random() * 2 });
    }

    // CONTROLES
    window.addEventListener("keydown", e => {
        if (estadoJogo === "INTRO") return; 
        if (estadoJogo === "GAMEOVER" || estadoJogo === "VITORIA") { reiniciarMissao(); return; }
        if (naveLocal.paralisadoTimer > 0) return;

        if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") naveLocal.movendoEsquerda = true;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") naveLocal.movendoDireita = true;
        
        if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") {
            if (!naveLocal.movendoCima) registrarComandoCombo("CIMA");
            naveLocal.movendoCima = true;
        }
        if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") {
            if (!naveLocal.movendoBaixo) registrarComandoCombo("BAIXO");
            naveLocal.movendoBaixo = true;
        }
        if (e.key === " " || e.key === "f" || e.key === "F") atirarLaserOrion();
    });

    window.addEventListener("keyup", e => {
        if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") naveLocal.movendoEsquerda = false;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") naveLocal.movendoDireita = false;
        if (e.key === "ArrowUp"    || e.key === "w" || e.key === "W") naveLocal.movendoCima = false;
        if (e.key === "ArrowDown"  || e.key === "s" || e.key === "S") naveLocal.movendoBaixo = false;
    });

    function mapearBotoesVirtuais() {
        // CORREÇÃO DE SÊNIOR: Ajustado o recuo para centralizar os controles dentro do espaço visível do Canvas
        let baseY = canvas.height - alturaPainel + 10;
        painel.btnEsq.y = baseY + 45; 
        painel.btnDir.y = baseY + 45;
        painel.btnCima.y = baseY; 
        painel.btnBaixo.y = baseY + 90; // Agora o botão "Baixo" tem espaço garantido antes do limite da tela
        painel.btnAtirar.x = canvas.width - 60; 
        painel.btnAtirar.y = baseY + 65;
    }

    function processarToques(e) {
        if (estadoJogo !== "JOGANDO_ORION" || naveLocal.paralisadoTimer > 0) return;
        e.preventDefault();
        
        let antesCima = naveLocal.movendoCima;
        let antesBaixo = naveLocal.movendoBaixo;

        naveLocal.movendoEsquerda = false; naveLocal.movendoDireita = false;
        naveLocal.movendoCima = false; naveLocal.movendoBaixo = false;

        const rect = canvas.getBoundingClientRect();
        for (let i = 0; i < e.touches.length; i++) {
            const t = e.touches[i]; const tx = t.clientX - rect.left; const ty = t.clientY - rect.top;
            if (tx >= painel.btnEsq.x && tx <= painel.btnEsq.x + painel.btnEsq.l && ty >= painel.btnEsq.y && ty <= painel.btnEsq.y + painel.btnEsq.a) naveLocal.movendoEsquerda = true;
            if (tx >= painel.btnDir.x && tx <= painel.btnDir.x + painel.btnDir.l && ty >= painel.btnDir.y && ty <= painel.btnDir.y + painel.btnDir.a) naveLocal.movendoDireita = true;
            if (tx >= painel.btnCima.x && tx <= painel.btnCima.x + painel.btnCima.l && ty >= painel.btnCima.y && ty <= painel.btnCima.y + painel.btnCima.a) naveLocal.movendoCima = true;
            if (tx >= painel.btnBaixo.x && tx <= painel.btnBaixo.x + painel.btnBaixo.l && ty >= painel.btnBaixo.y && ty <= painel.btnBaixo.y + painel.btnBaixo.a) naveLocal.movendoBaixo = true;
        }

        if (naveLocal.movendoCima && !antesCima) registrarComandoCombo("CIMA");
        if (naveLocal.movendoBaixo && !antesBaixo) registrarComandoCombo("BAIXO");
    }

    canvas.addEventListener("touchstart", e => {
        if (estadoJogo === "GAMEOVER" || estadoJogo === "VITORIA") { reiniciarMissao(); return; }

        const rect = canvas.getBoundingClientRect();
        const t = e.changedTouches[0]; const tx = t.clientX - rect.left; const ty = t.clientY - rect.top;

        let dAtirar = Math.sqrt(Math.pow(tx - painel.btnAtirar.x, 2) + Math.pow(ty - painel.btnAtirar.y, 2));
        if (dAtirar <= painel.btnAtirar.raio && estadoJogo === "JOGANDO_ORION" && naveLocal.paralisadoTimer <= 0) {
            atirarLaserOrion();
        }
        processarToques(e);
    }, { passive: false });

    canvas.addEventListener("touchmove", processarToques, { passive: false });
    canvas.addEventListener("touchend", e => {
        if(e.touches.length === 0) {
            naveLocal.movendoEsquerda = false; naveLocal.movendoDireita = false;
            naveLocal.movendoCima = false; naveLocal.movendoBaixo = false;
        } else { processarToques(e); }
    }, { passive: false });

    function iniciarMissaoReal() {
        estadoJogo = "JOGANDO_ORION";
        naveLocal.x = canvas.width / 2 - naveLocal.l / 2;
        naveLocal.y = canvas.height - alturaPainel - 60;
        naveLocal.vida = naveLocal.maxVida;
        naveLocal.tipoArma = "NORMAL";
        naveLocal.misseisEstocados = 0; 
        naveLocal.paralisadoTimer = 0;
        batedoresAbatidos = 0;
        bossAtivo = false;
        chefaAranha.vida = chefaAranha.maxVida;
        chefaAranha.y = -120;
        tirosJogador = []; tirosInimigos = []; batedoresLista = []; bonusLista = []; teiasLista = []; particulasExplosao = [];
    }

    function reiniciarMissao() { 
        estadoJogo = "INTRO"; 
        faseIntro = "MAURO_ENTRANDO"; 
        timerCinematico = 0;
        mauroEscala = 0.05; mauroRotacao = 0;
        aranhaEscala = 0.05; aranhaRotacao = 0;
        audioDisparado = false;
        somSuspense.currentTime = 0;
    }

    function atirarLaserOrion() {
        if (naveLocal.tipoArma === "NORMAL") {
            tirosJogador.push({ x: naveLocal.x + naveLocal.l / 2 - 2, y: naveLocal.y - 10, l: 4, a: 30, velY: -14, tipo: "LASER" });
        } 
        else if (naveLocal.tipoArma === "DUPLO") {
            tirosJogador.push({ x: naveLocal.x + 5, y: naveLocal.y - 10, l: 4, a: 30, velY: -14, tipo: "LASER" });
            tirosJogador.push({ x: naveLocal.x + naveLocal.l - 9, y: naveLocal.y - 10, l: 4, a: 30, velY: -14, tipo: "LASER" });
        }
        tocarSomTiro();
    }

    function disparoEfeitoFogoNave() {
        criarExplosao(naveLocal.x + naveLocal.l/2, naveLocal.y + naveLocal.a, "#00ffff", 2);
    }

    function dispararMissilEstocado() {
        if (naveLocal.misseisEstocados > 0) {
            let nLargura = 65; 
            let nAltura = 95;  
            tirosJogador.push({ 
                x: naveLocal.x + naveLocal.l / 2 - (nLargura / 2), 
                y: naveLocal.y - nAltura, 
                l: nLargura, 
                a: nAltura, 
                velY: -9, 
                tipo: "MISSIL" 
            });
            naveLocal.misseisEstocados--; 
            tocarSomTiro();
        }
    }

    function spawnBonus(x, y, totalAbates) {
        if (totalAbates % 5 === 0 && totalAbates % 10 !== 0 && totalAbates % 20 !== 0) {
            bonusLista.push({ x: x, y: y, r: 8, velY: 2, tipo: "VIDA" }); 
        }
        if (totalAbates % 10 === 0 && totalAbates % 20 !== 0) {
            bonusLista.push({ x: x, y: y, r: 8, velY: 2, tipo: "DUPLO" }); 
        }
        if (totalAbates % 20 === 0) {
            bonusLista.push({ x: x, y: y, r: 8, velY: 2, tipo: "MISSIL" }); 
        }
    }

    function verificarColisao(obj1, obj2) {
        return obj1.x < obj2.x + obj2.l && 
               obj1.x + obj1.l > obj2.x && 
               obj1.y < obj2.y + obj2.a && 
               obj1.y + obj1.a > obj2.y;
    }

    function atualizarFaseOrion() {
        for (let i = particulasExplosao.length - 1; i >= 0; i--) {
            let p = particulasExplosao[i];
            p.x += p.velX; p.y += p.velY; p.vida--;
            if (p.vida <= 0) particulasExplosao.splice(i, 1);
        }

        estrelasFundo.forEach(est => {
            est.y += est.vel;
            if (est.y > canvas.height) { est.y = 0; est.x = Math.random() * canvas.width; }
        });

        if (estadoJogo === "INTRO") {
            timerCinematico++;
            let centroX = canvas.width / 2;
            let centroY = canvas.height / 2 - 50;
            
            mauroX_Final = centroX - 100; mauroY_Final = centroY;
            aranhaX_Final = centroX + 100; aranhaY_Final = centroY;

            if (faseIntro === "MAURO_ENTRANDO") {
                if (mauroEscala < 1) { mauroEscala += 0.015; mauroRotacao -= 0.08; } 
                else { mauroEscala = 1; mauroRotacao = 0; faseIntro = "ARANHA_ENTRANDO"; }
            } 
            else if (faseIntro === "ARANHA_ENTRANDO") {
                if (aranhaEscala < 1) { aranhaEscala += 0.015; aranhaRotacao += 0.08; } 
                else { aranhaEscala = 1; aranhaRotacao = 0; faseIntro = "VERSUS_ATIVO"; }
            } 
            else if (faseIntro === "VERSUS_ATIVO") {
                if (!audioDisparado) {
                    somSuspense.play().catch(() => { setTimeout(iniciarMissaoReal, 5000); });
                    audioDisparado = true;
                }
            }
            return;
        }

        if (estadoJogo !== "JOGANDO_ORION") return;

        if (timerCinematico % 3 === 0) disparoEfeitoFogoNave();

        if (naveLocal.paralisadoTimer > 0) {
            naveLocal.paralisadoTimer--;
            naveLocal.movendoEsquerda = false; naveLocal.movendoDireita = false;
            naveLocal.movendoCima = false; naveLocal.movendoBaixo = false;
        }

        let limiteMaxY = canvas.height - alturaPainel - naveLocal.a;
        if (naveLocal.movendoEsquerda && naveLocal.x > 0) naveLocal.x -= naveLocal.velocidade;
        if (naveLocal.movendoDireita && naveLocal.x < canvas.width - naveLocal.l) naveLocal.x += naveLocal.velocidade;
        if (naveLocal.movendoCima && naveLocal.y > 40) naveLocal.y -= naveLocal.velocidade;
        if (naveLocal.movendoBaixo && naveLocal.y < limiteMaxY) naveLocal.y += naveLocal.velocidade;

        for (let i = tirosJogador.length - 1; i >= 0; i--) {
            tirosJogador[i].y += tirosJogador[i].velY;
            if (tirosJogador[i].y < 0) tirosJogador.splice(i, 1);
        }

        if (batedoresAbatidos >= metaChefe && !bossAtivo) {
            bossAtivo = true; batedoresLista = []; 
            criarExplosao(canvas.width/2, 100, "#00ffcc", 30);
        }

        if (bossAtivo) {
            if (chefaAranha.y < 60) {
                chefaAranha.y += chefaAranha.velY;
            } else {
                chefaAranha.mudarAlvoTimer--;
                if (chefaAranha.mudarAlvoTimer <= 0) {
                    chefaAranha.alvoX = Math.random() * (canvas.width - chefaAranha.l);
                    chefaAranha.velX = (Math.random() * 4 + 3); 
                    chefaAranha.mudarAlvoTimer = Math.random() * 50 + 30; 
                }

                if (chefaAranha.x < chefaAranha.alvoX) chefaAranha.x += chefaAranha.velX;
                if (chefaAranha.x > chefaAranha.alvoX) chefaAranha.x -= chefaAranha.velX;

                if (chefaAranha.x < 0) chefaAranha.x = 0;
                if (chefaAranha.x > canvas.width - chefaAranha.l) chefaAranha.x = canvas.width - chefaAranha.l;

                chefaAranha.ataqueTimer++;
                if (chefaAranha.ataqueTimer > 50) { 
                    let centerX = chefaAranha.x + chefaAranha.l / 2;
                    let centerY = chefaAranha.y + chefaAranha.a - 10;
                    tirosInimigos.push({ x: centerX, y: centerY, l: 6, a: 12, velX: -2, velY: 6 }); 
                    tirosInimigos.push({ x: centerX, y: centerY, l: 6, a: 12, velX: 0,  velY: 7 });  
                    tirosInimigos.push({ x: centerX, y: centerY, l: 6, a: 12, velX: 2,  velY: 6 });  
                    chefaAranha.ataqueTimer = 0;
                }

                chefaAranha.teiaTimer++;
                if (chefaAranha.teiaTimer > 160) {
                    let centerX = chefaAranha.x + chefaAranha.l / 2;
                    teiasLista.push({ x: centerX - 30, y: chefaAranha.y + chefaAranha.a - 5, l: 60, a: 60, velY: 4.5 });
                    chefaAranha.teiaTimer = 0;
                }
            }

            for (let j = tirosJogador.length - 1; j >= 0; j--) {
                if (verificarColisao(tirosJogador[j], chefaAranha)) {
                    let dano = tirosJogador[j].tipo === "MISSIL" ? 5 : 1;
                    chefaAranha.vida -= dano;
                    criarExplosao(tirosJogador[j].x + tirosJogador[j].l/2, tirosJogador[j].y, "#ff0055", 8);
                    tirosJogador.splice(j, 1);
                    tocarSomExplosao(); 
                    if (chefaAranha.vida <= 0) {
                        criarExplosao(chefaAranha.x + chefaAranha.l/2, chefaAranha.y + chefaAranha.a/2, "#ff3300", 60);
                        estadoJogo = "VITORIA";
                    }
                    break;
                }
            }
        } 
        
        else {
            spawnTimer++;
            if (spawnTimer > 40 && batedoresLista.length < 5) {
                batedoresLista.push({
                    x: Math.random() * (canvas.width - 35),
                    y: -40, l: 35, a: 35,
                    velY: Math.random() * 2 + 2,
                    cooldownTiro: Math.random() * 60 + 30
                });
                spawnTimer = 0;
            }

            for (let i = batedoresLista.length - 1; i >= 0; i--) {
                let bat = batedoresLista[i];
                bat.y += bat.velY;

                bat.cooldownTiro--;
                if (bat.cooldownTiro <= 0) {
                    tirosInimigos.push({ x: bat.x + bat.l/2 - 2, y: bat.y + bat.a, l: 5, a: 10, velX: 0, velY: 5 });
                    bat.cooldownTiro = Math.random() * 90 + 60;
                }

                if (bat.y > canvas.height - alturaPainel) { batedoresLista.splice(i, 1); continue; }

                if (verificarColisao(bat, naveLocal)) {
                    naveLocal.vida -= 2;
                    criarExplosao(bat.x + bat.l/2, bat.y + bat.a/2, "#ffaa00", 20);
                    batedoresLista.splice(i, 1);
                    tocarSomExplosao(); 
                    if (naveLocal.vida <= 0) estadoJogo = "GAMEOVER";
                    continue;
                }

                for (let j = tirosJogador.length - 1; j >= 0; j--) {
                    if (verificarColisao(tirosJogador[j], bat)) {
                        criarExplosao(bat.x + bat.l/2, bat.y + bat.a/2, "#ff3300", 15);
                        batedoresLista.splice(i, 1);
                        tirosJogador.splice(j, 1);
                        batedoresAbatidos++;
                        tocarSomExplosao(); 
                        spawnBonus(bat.x, bat.y, batedoresAbatidos); 
                        break;
                    }
                }
            }
        }

        for (let i = tirosInimigos.length - 1; i >= 0; i--) {
            let te = tirosInimigos[i];
            te.y += te.velY; te.x += te.velX;

            if (te.y > canvas.height - alturaPainel || te.x < 0 || te.x > canvas.width) {
                tirosInimigos.splice(i, 1); continue;
            }

            if (verificarColisao(te, naveLocal)) {
                naveLocal.vida--; 
                criarExplosao(te.x, te.y, "#00ffff", 10);
                tirosInimigos.splice(i, 1);
                tocarSomExplosao(); 
                if (naveLocal.vida <= 0) {
                    criarExplosao(naveLocal.x + naveLocal.l/2, naveLocal.y + naveLocal.a/2, "#ffffff", 45);
                    estadoJogo = "GAMEOVER";
                }
            }
        }

        for (let i = teiasLista.length - 1; i >= 0; i--) {
            let web = teiasLista[i];
            web.y += web.velY;
            if (web.y > canvas.height - alturaPainel) { teiasLista.splice(i, 1); continue; }

            if (verificarColisao(web, naveLocal)) {
                naveLocal.paralisadoTimer = 120; 
                criarExplosao(web.x + web.l/2, web.y + web.a/2, "#ffffff", 12); 
                teiasLista.splice(i, 1);
            }
        }

        for (let i = bonusLista.length - 1; i >= 0; i--) {
            let item = bonusLista[i];
            item.y += item.velY;
            if (item.y > canvas.height - alturaPainel) { bonusLista.splice(i, 1); continue; }

            let boxBonus = { x: item.x - item.r, y: item.y - item.r, l: item.r * 2, a: item.r * 2 };
            if (verificarColisao(boxBonus, naveLocal)) {
                if (item.tipo === "VIDA")  naveLocal.vida = Math.min(naveLocal.vida + 3, naveLocal.maxVida);
                if (item.tipo === "DUPLO") naveLocal.tipoArma = "DUPLO";
                if (item.tipo === "MISSIL") naveLocal.misseisEstocados++; 
                
                // MECA-AJUSTE: Sem explosão! Toca o som de bônus e remove direto para dentro do cockpit
                tocarSomBonus();
                bonusLista.splice(i, 1);
            }
        }
    }

    // --- RENDERIZADOR GRÁFICO ---
    function desenharFaseOrion() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#ffffff";
        estrelasFundo.forEach(est => { ctx.fillRect(est.x, est.y, est.tamanho, est.tamanho); });

        if (estadoJogo === "INTRO") {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centroX = canvas.width / 2;
            let centroY = canvas.height / 2 - 50;
            let tamFoto = 110; 

            ctx.save();
            if (faseIntro === "MAURO_ENTRANDO") {
                ctx.translate(centroX, centroY); ctx.scale(mauroEscala, mauroEscala); ctx.rotate(mauroRotacao);
            } else { ctx.translate(mauroX_Final, mauroY_Final); }
            if (imgMauroCockpit.complete && imgMauroCockpit.naturalWidth !== 0) {
                ctx.drawImage(imgMauroCockpit, -tamFoto/2, -tamFoto/2, tamFoto, tamFoto);
            } else { ctx.fillStyle = "#00aaff"; ctx.fillRect(-tamFoto/2, -tamFoto/2, tamFoto, tamFoto); }
            ctx.strokeStyle = "#00bfff"; ctx.lineWidth = 3; ctx.strokeRect(-tamFoto/2, -tamFoto/2, tamFoto, tamFoto);
            ctx.restore();

            if (faseIntro !== "MAURO_ENTRANDO") {
                ctx.save();
                if (faseIntro === "ARANHA_ENTRANDO") {
                    ctx.translate(centroX, centroY); ctx.scale(aranhaEscala, aranhaEscala); ctx.rotate(aranhaRotacao);
                } else { ctx.translate(aranhaX_Final, aranhaY_Final); }
                if (imgAranhaIntro.complete && imgAranhaIntro.naturalWidth !== 0) {
                    ctx.drawImage(imgAranhaIntro, -tamFoto/2, -tamFoto/2, tamFoto, tamFoto);
                } else { ctx.fillStyle = "#ff2222"; ctx.fillRect(-tamFoto/2, -tamFoto/2, tamFoto, tamFoto); }
                ctx.strokeStyle = "#ff3333"; ctx.lineWidth = 3; ctx.strokeRect(-tamFoto/2, -tamFoto/2, tamFoto, tamFoto);
                ctx.restore();
            }

            if (faseIntro === "VERSUS_ATIVO") {
                ctx.fillStyle = "#ffcc00"; ctx.font = "bold 38px 'Impact', sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                let pulso = 1 + Math.sin(timerCinematico * 0.1) * 0.05;
                ctx.save(); ctx.translate(centroX, centroY); ctx.scale(pulso, pulso); ctx.fillText("X", 0, 0); ctx.restore();

                ctx.font = "bold 13px monospace"; ctx.fillStyle = "#00ffcc";
                ctx.fillText("CMD. MAURO", mauroX_Final, mauroY_Final + tamFoto/2 + 20);
                ctx.fillStyle = "#ff3333";
                ctx.fillText("A ARANHA", aranhaX_Final, aranhaY_Final + tamFoto/2 + 20);

                ctx.fillStyle = "#ff3300"; ctx.font = "bold 15px 'Segoe UI'";
                ctx.fillText("⚠️ AMEAÇA DETECTADA VINDA DE ÓRION ⚠️", centroX, canvas.height - 180);
                ctx.fillStyle = "#ffffff"; ctx.font = "italic 14px 'Segoe UI'";
                ctx.fillText("Vamos defender a Via Láctea!", centroX, canvas.height - 150);
            }
            return;
        } 
        
        else if (estadoJogo === "JOGANDO_ORION") {
            tirosJogador.forEach(t => {
                if (t.tipo === "MISSIL") {
                    if (imgMissil.complete && imgMissil.naturalWidth !== 0) {
                        ctx.drawImage(imgMissil, t.x, t.y, t.l, t.a);
                    } else {
                        ctx.fillStyle = "#ff5500"; ctx.fillRect(t.x, t.y, t.l, t.a); 
                    }
                } else {
                    ctx.shadowBlur = 10; ctx.shadowColor = "#00aaff"; ctx.fillStyle = "#d0efff";
                    ctx.fillRect(t.x, t.y, t.l, t.a); ctx.shadowBlur = 0;
                }
            });

            ctx.fillStyle = "#ffea00";
            tirosInimigos.forEach(te => {
                ctx.beginPath(); ctx.arc(te.x + te.l/2, te.y + te.a/2, te.l, 0, Math.PI*2); ctx.fill();
            });

            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5;
            teiasLista.forEach(web => {
                let cx = web.x + web.l/2; let cy = web.y + web.a/2; ctx.beginPath();
                for(let r = 8; r <= 32; r += 10) { ctx.arc(cx, cy, r, 0, Math.PI*2); }
                for(let d=0; d<8; d++) {
                    let ang = (d * Math.PI) / 4; ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(ang)*32, cy + Math.sin(ang)*32);
                }
                ctx.stroke();
            });

            bonusLista.forEach(item => {
                ctx.beginPath(); ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
                if (item.tipo === "VIDA") ctx.fillStyle = "#00ff66"; 
                else if (item.tipo === "DUPLO") ctx.fillStyle = "#00aaff"; 
                else if (item.tipo === "MISSIL") ctx.fillStyle = "#ff6600"; 
                ctx.fill(); ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5; ctx.stroke();
            });

            batedoresLista.forEach(bat => {
                if (imgBatedor.complete && imgBatedor.naturalWidth !== 0) {
                    ctx.drawImage(imgBatedor, bat.x, bat.y, bat.l, bat.a);
                } else { ctx.fillStyle = "#ff3333"; ctx.fillRect(bat.x, bat.y, bat.l, bat.a); }
            });

            if (bossAtivo) {
                if (imgChefeCombate.complete && imgChefeCombate.naturalWidth !== 0) {
                    ctx.drawImage(imgChefeCombate, chefaAranha.x, chefaAranha.y, chefaAranha.l, chefaAranha.a);
                } else { ctx.fillStyle = "#a30000"; ctx.fillRect(chefaAranha.x, chefaAranha.y, chefaAranha.l, chefaAranha.a); }
                ctx.fillStyle = "#333"; ctx.fillRect(canvas.width / 2 - 80, 48, 160, 6);
                let pctBoss = Math.max(0, chefaAranha.vida / chefaAranha.maxVida);
                ctx.fillStyle = "#ff0044"; ctx.fillRect(canvas.width / 2 - 80, 48, 160 * pctBoss, 6);
            }

            if (imgNave.complete && imgNave.naturalWidth !== 0) {
                ctx.drawImage(imgNave, naveLocal.x, naveLocal.y, naveLocal.l, naveLocal.a);
            } else { ctx.fillStyle = "#00aaff"; ctx.fillRect(naveLocal.x, naveLocal.y, naveLocal.l, naveLocal.a); }

            if (naveLocal.paralisadoTimer > 0) {
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)"; ctx.lineWidth = 3;
                ctx.strokeRect(naveLocal.x - 4, naveLocal.y - 4, naveLocal.l + 8, naveLocal.a + 8);
            }

            particulasExplosao.forEach(p => {
                ctx.save(); ctx.globalAlpha = p.vida / p.maxVida; ctx.fillStyle = p.cor; ctx.beginPath();
                ctx.arc(p.x, p.y, p.raio, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });

            // HUD
            ctx.fillStyle = "rgba(10, 25, 50, 0.9)"; ctx.fillRect(0, 0, canvas.width, 42);
            ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 1; ctx.strokeRect(0, 0, canvas.width, 42);
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px monospace"; ctx.textAlign = "left";
            ctx.fillText(`🛸 ABATES: ${batedoresAbatidos}/${metaChefe}`, 10, 26);
            ctx.fillStyle = "#ff7700"; ctx.fillText(`🚀 MÍSSEIS: ${naveLocal.misseisEstocados}`, 125, 26);
            ctx.fillStyle = "#ffffff"; ctx.textAlign = "right"; ctx.fillText("ESCUDO:", canvas.width - 95, 26);
            ctx.fillRect(canvas.width - 85, 15, 75, 12);
            let pctVida = Math.max(0, naveLocal.vida / naveLocal.maxVida);
            ctx.fillStyle = pctVida > 0.4 ? "#00ff88" : "#ff3333"; ctx.fillRect(canvas.width - 85, 15, 75 * pctVida, 12);

            // D-PAD
            mapearBotoesVirtuais(); ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2;
            let botoesDPad = [
                { b: painel.btnEsq,  seta: "◀" }, { b: painel.btnDir,  seta: "▶" },
                { b: painel.btnCima, seta: "▲" }, { b: painel.btnBaixo,seta: "▼" }
            ];
            botoesDPad.forEach(item => {
                ctx.fillStyle = "rgba(0, 203, 214, 0.05)"; ctx.fillRect(item.b.x, item.b.y, item.b.l, item.b.a);
                ctx.strokeRect(item.b.x, item.b.y, item.b.l, item.b.a);
                ctx.fillStyle = "#00ffff"; ctx.font = "20px 'Segoe UI'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(item.seta, item.b.x + item.b.l / 2, item.b.y + item.b.a / 2);
            });

            let gradienteTiro = ctx.createRadialGradient(painel.btnAtirar.x, painel.btnAtirar.y, 5, painel.btnAtirar.x, painel.btnAtirar.y, painel.btnAtirar.raio);
            gradienteTiro.addColorStop(0, "#ffbb44"); gradienteTiro.addColorStop(0.6, "#f04e18"); gradienteTiro.addColorStop(1, "#9e1f00");
            ctx.fillStyle = gradienteTiro; ctx.beginPath(); ctx.arc(painel.btnAtirar.x, painel.btnAtirar.y, painel.btnAtirar.raio, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1.5; ctx.stroke();
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 12px 'Segoe UI'"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
            ctx.fillText("FOGO", painel.btnAtirar.x, painel.btnAtirar.y);
        } 
        
        else if (estadoJogo === "GAMEOVER") {
            ctx.fillStyle = "rgba(20, 0, 0, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.fillStyle = "#ff3333"; ctx.font = "bold 28px 'Segoe UI'";
            ctx.fillText("MISSION FAILED", canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = "#ffffff"; ctx.font = "14px 'Segoe UI'";
            ctx.fillText("A simulação foi encerrada por danos críticos.", canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillStyle = "#888"; ctx.fillText("Toque para reiniciar os sistemas", canvas.width / 2, canvas.height / 2 + 70);
        } 
        
        else if (estadoJogo === "VITORIA") {
            ctx.fillStyle = "rgba(0, 20, 10, 0.9)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.fillStyle = "#00ff88"; ctx.font = "bold 26px 'Segoe UI'";
            ctx.fillText("INVASÃO FRUSTRADA!", canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = "#ffffff"; ctx.font = "15px 'Segoe UI'";
            ctx.fillText("A Aranha foi obliterada pelo míssil tático M_2.", canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillStyle = "#00ffcc"; ctx.fillText("Parabéns, Comandante Mauro!", canvas.width / 2, canvas.height / 2 + 45);
            ctx.fillStyle = "#888"; ctx.fillText("Toque para nova patrulha", canvas.width / 2, canvas.height / 2 + 95);
        }
    }

    function loopPrincipalOrion() {
        atualizarFaseOrion();
        desenharFaseOrion();
        requestAnimationFrame(loopPrincipalOrion);
    }

    window.addEventListener("resize", () => { redimensionar(); });
    redimensionar();
    loopPrincipalOrion();
</script>
