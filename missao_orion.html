<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/x-icon" href="batedor_3.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Fighter - Módulo 2: Orion (Ajustes de Míssil e Bônus)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
            display: flex;
            flex-direction: column;
        }
        canvas {
            width: 100%;
            flex-grow: 1;
            background: radial-gradient(circle at center, #0b1d3a 0%, #020813 100%);
            display: block;
        }
    </style>
</head>
<body>

<div id="container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- CARREGAMENTO DE ATIVOS SEPARADOS ---
    const imgNave = new Image(); imgNave.src = "nave.png";
    const imgBatedor = new Image(); imgBatedor.src = "batedor_3.png"; 
    const imgMissil = new Image(); imgMissil.src = "m_2.png"; 
    
    // Separação Blindada
    const imgChefeCombate = new Image(); imgChefeCombate.src = "aranha_maldita.png"; 
    const imgAranhaIntro = new Image(); imgAranhaIntro.src = "aranha_1_x.png"; 
    const imgMauroCockpit = new Image(); imgMauroCockpit.src = "Mauro_1_x.png"; 

    // --- SISTEMA DE ÁUDIO ---
    function tocarSomTiro() {
        const som = new Audio("til.mp3");
        som.volume = 0.4;
        som.play().catch(() => {});
    }

    function tocarSomExplosao() {
        const som = new Audio("bum.mp3");
        som.volume = 0.6;
        som.play().catch(() => {});
    }

    // NOVO: Som exclusivo para coleta de itens na mochila/nave
    function tocarSomBonus() {
        const som = new Audio("bonus.mp3");
        som.volume = 0.6;
        som.play().catch(() => {});
    }

    const somSuspense = new Audio("suspense.mp3");
    somSuspense.volume = 0.7;
    
    somSuspense.onended = function() {
        if (estadoJogo === "INTRO") {
            iniciarMissaoReal();
        }
    };

    function redimensionar() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
    }

    // --- MÁQUINA DE ESTADOS ---
    let estadoJogo = "INTRO";
    let faseIntro = "MAURO_ENTRANDO"; 
    let timerCinematico = 0;

    let mauroEscala = 0.05;
    let mauroRotacao = 0;
    let mauroX_Final = 0;
    let mauroY_Final = 0;

    let aranhaEscala = 0.05;
    let aranhaRotacao = 0;
    let aranhaX_Final = 0;
    let aranhaY_Final = 0;

    let audioDisparado = false;
    
    // CORREÇÃO DE SÊNIOR: Aumentado de 160 para 190 para dar margem de segurança no mobile
    let alturaPainel = 190; 

    // --- SISTEMA DE PARTÍCULAS ---
    let particulasExplosao = [];

    function criarExplosao(x, y, cor = "#ff5500", quantidade = 15) {
        for (let i = 0; i < quantidade; i++) {
            particulasExplosao.push({
                x: x,
                y: y,
                velX: (Math.random() - 0.5) * 6,
                velY: (Math.random() - 0.5) * 6,
                raio: Math.random() * 3 + 1,
                vida: Math.random() * 20 + 20,
                maxVida: 40,
                cor: cor
            });
        }
    }

    // Painel tátil mobile
    let painel = {
        btnEsq:  { x: 20,  y: 0, l: 45, a: 45 },
        btnDir:  { x: 110, y: 0, l: 45, a: 45 },
        btnCima: { x: 65,  y: 0, l: 45, a: 45 },
        btnBaixo:{ x: 65,  y: 0, l: 45, a: 45 },
        btnAtirar:{ x: 0,   y: 0, raio: 35 }
    };

    // Nave Status
    let naveLocal = {
        x: 0, y: 0, l: 45, a: 50,
        velocidade: 5,
        vida: 10, maxVida: 10,
        tipoArma: "NORMAL", 
        misseisEstocados: 0, 
        paralisadoTimer: 0, 
        movendoEsquerda: false, movendoDireita: false, movendoCima: false, movendoBaixo: false
    };

    let historicoComandos = [];
    let tempoUltimoComando = 0;

    function registrarComandoCombo(direcao) {
        const agora = Date.now();
        if (agora - tempoUltimoComando > 600) {
            historicoComandos = [];
        }
        tempoUltimoComando = agora;
        historicoComandos.push(direcao);
        
        if (historicoComandos.length >= 3) {
            const tam = historicoComandos.length;
            if (historicoComandos[tam-3] === "BAIXO" && 
                historicoComandos[tam-2] === "BAIXO" && 
                historicoComandos[tam-1] === "CIMA") {
                
                dispararMissilEstocado(); 
                historicoComandos = []; 
            }
        }
    }

    let tirosJogador = [];
    let tirosInimigos = [];
    let teiasLista = [];
    let batedoresLista = [];
    let bonusLista = [];
    let estrelasFundo = [];
    
    let batedoresAbatidos = 0;
    let metaChefe = 50; 
    let bossAtivo = false;
    let spawnTimer = 0;

    let chefaAranha = {
        x: 150, y: -120, l: 120, a: 100,
        vida: 60, maxVida: 60,
        velX: 4, velY: 1, alvoX: 150,
        mudarAlvoTimer: 0, ataqueTimer: 0, teiaTimer: 0
    };

    for (let i = 0; i < 40; i++) {
        estrelasFundo.push({ x: Math.random() * 450, y: Math.random() * 850, vel: Math.random() * 2 + 1, tamanho: Math.random() * 2 });
    }

    // CONTROLES
    window.addEventListener("keydown", e => {
        if (estadoJogo === "INTRO") return; 
        if (estadoJogo === "GAMEOVER" || estadoJogo === "VITORIA") { reiniciarMissao(); return; }
        if (naveLocal.paralisadoTimer > 0) return;

        if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") naveLocal.movendoEsquerda = true;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") naveLocal.movendoDireita = true;
        
        if (e.key === "ArrowUp" || e.key === "w" || e.key === "W") {
            if (!naveLocal.movendoCima) registrarComandoCombo("CIMA");
            naveLocal.movendoCima = true;
        }
        if (e.key === "ArrowDown" || e.key === "s" || e.key === "S") {
            if (!naveLocal.movendoBaixo) registrarComandoCombo("BAIXO");
            naveLocal.movendoBaixo = true;
        }
        if (e.key === " " || e.key === "f" || e.key === "F") atirarLaserOrion();
    });

    window.addEventListener("keyup", e => {
        if (e.key === "ArrowLeft"  || e.key === "a" || e.key === "A") naveLocal.movendoEsquerda = false;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") naveLocal.movendoDireita = false;
        if (e.key === "ArrowUp"    || e.key === "w" || e.key === "W") naveLocal.movendoCima = false;
        if (e.key === "ArrowDown"  || e.key === "s" || e.key === "S") naveLocal.movendoBaixo = false;
    });

    function mapearBotoesVirtuais() {
        // CORREÇÃO DE SÊNIOR: Ajustado o recuo para centralizar os controles dentro do espaço visível do Canvas
        let baseY = canvas.height - alturaPainel + 30;
        painel.btnEsq.y = baseY + 45; 
        painel.btnDir.y = baseY + 45;
        painel.btnCima.y = baseY; 
        painel.btnBaixo.y = baseY + 90; // Agora o botão "Baixo" tem espaço garantido antes do limite da tela
        painel.btnAtirar.x = canvas.width - 60; 
        painel.btnAtirar.y = baseY + 65;
    }

    function processarToques(e) {
        if (estadoJogo !== "JOGANDO_ORION" || naveLocal.paralisadoTimer > 0) return;
        e.preventDefault();
        
        let antesCima = naveLocal.movendoCima;
        let antesBaixo = naveLocal.movendoBaixo;

        naveLocal.movendoEsquerda = false; naveLocal.movendoDireita = false;
        naveLocal.movendoCima = false; naveLocal.movendoBaixo = false;

        const rect = canvas.getBoundingClientRect();
        for (let i = 0; i < e.touches.length; i++) {
            const t = e.touches[i]; const tx = t.clientX - rect.left; const ty = t.clientY - rect.top;
            if (tx >= painel.btnEsq.x && tx <= painel.btnEsq.x + painel.btnEsq.l && ty >= painel.btnEsq.y && ty <= painel.btnEsq.y + painel.btnEsq.a) naveLocal.movendoEsquerda = true;
            if (tx >= painel.btnDir.x && tx <= painel.btnDir.x + painel.btnDir.l && ty >= painel.btnDir.y && ty <= painel.btnDir.y + painel.btnDir.a) naveLocal.movendoDireita = true;
            if (tx >= painel.btnCima.x && tx <= painel.btnCima.x + painel.btnCima.l && ty >= painel.btnCima.y && ty <= painel.btnCima.y + painel.btnCima.a) naveLocal.movendoCima = true;
            if (tx >= painel.btnBaixo.x && tx <= painel.btnBaixo.x + painel.btnBaixo.l && ty >= painel.btnBaixo.y && ty <= painel.btnBaixo.y + painel.btnBaixo.a) naveLocal.movendoBaixo = true;
        }

        if (naveLocal.movendoCima && !antesCima) registrarComandoCombo("CIMA");
        if (naveLocal.movendoBaixo && !antesBaixo) registrarComandoCombo("BAIXO");
    }

    canvas.addEventListener("touchstart", e => {
        if (estadoJogo === "GAMEOVER" || estadoJogo === "VITORIA") { reiniciarMissao(); return; }

        const rect = canvas.getBoundingClientRect();
        const t = e.changedTouches[0]; const tx = t.clientX - rect.left; const ty = t.clientY - rect.top;

        let dAtirar = Math.sqrt(Math.pow(tx - painel.btnAtirar.x, 2) + Math.pow(ty - painel.btnAtirar.y, 2));
        if (dAtirar <= painel.btnAtirar.raio && estadoJogo === "JOGANDO_ORION" && naveLocal.paralisadoTimer <= 0) {
            atirarLaserOrion();
        }
        processarToques(e);
    }, { passive: false });

    canvas.addEventListener("touchmove", processarToques, { passive: false });
    canvas.addEventListener("touchend", e => {
        if(e.touches.length === 0) {
            naveLocal.movendoEsquerda = false; naveLocal.movendoDireita = false;
            naveLocal.movendoCima = false; naveLocal.movendoBaixo = false;
        } else { processarToques(e); }
    }, { passive: false });

    function iniciarMissaoReal() {
        estadoJogo = "JOGANDO_ORION";
        naveLocal.x = canvas.width / 2 - naveLocal.l / 2;
        naveLocal.y = canvas.height - alturaPainel - 60;
        naveLocal.vida = naveLocal.maxVida;
        naveLocal.tipoArma = "NORMAL";
        naveLocal.misseisEstocados = 0; 
        naveLocal.paralisadoTimer = 0;
        batedoresAbatidos = 0;
        bossAtivo = false;
        chefaAranha.vida = chefaAranha.maxVida;
        chefaAranha.y = -120;
        tirosJogador = []; tirosInimigos = []; batedoresLista = []; bonusLista = []; teiasLista = []; particulasExplosao = [];
    }

    function reiniciarMissao() { 
        estadoJogo = "INTRO"; 
        faseIntro = "MAURO_ENTRANDO"; 
        timerCinematico = 0;
        mauroEscala = 0.05; mauroRotacao = 0;
        aranhaEscala = 0.05; aranhaRotacao = 0;
        audioDisparado = false;
        somSuspense.currentTime = 0;
    }

    function atirarLaserOrion() {
        if (naveLocal.tipoArma === "NORMAL") {
            tirosJogador.push({ x: naveLocal.x + naveLocal.l / 2 - 2, y: naveLocal.y - 10, l: 4, a: 30, velY: -14, tipo: "LASER" });
        } 
        else if (naveLocal.tipoArma === "DUPLO") {
            tirosJogador.push({ x: naveLocal.x + 5, y: naveLocal.y - 10, l: 4, a: 30, velY: -14, tipo: "LASER" });
            tirosJogador.push({ x: naveLocal.x + naveLocal.l - 9, y: naveLocal.y - 10, l: 4, a: 30, velY: -14, tipo: "LASER" });
        }
        tocarSomTiro();
    }

    function disparoEfeitoFogoNave() {
        criarExplosao(naveLocal.x + naveLocal.l/2, naveLocal.y + naveLocal.a, "#00ffff", 2);
    }

    function dispararMissilEstocado() {
        if (naveLocal.misseisEstocados > 0) {
            let nLargura = 65; 
            let nAltura = 95;  
            tirosJogador.push({ 
                x: naveLocal.x + naveLocal.l / 2 - (nLargura / 2), 
                y: naveLocal.y - nAltura, 
                l: nLargura, 
                a: nAltura, 
                velY: -9, 
                tipo: "MISSIL" 
            });
            naveLocal.misseisEstocados--; 
            tocarSomTiro();
        }
    }

    function spawnBonus(x, y, totalAbates) {
        if (totalAbates % 5 === 0 && totalAbates % 10 !== 0 && totalAbates % 20 !== 0) {
            bonusLista.push({ x: x, y: y, r: 8, velY: 2, tipo: "VIDA" }); 
        }
        if (totalAbates % 10 === 0 && totalAbates % 20 !== 0) {
            bonusLista.push({ x: x, y: y, r: 8, velY: 2, tipo: "DUPLO" }); 
        }
        if (totalAbates % 20 === 0) {
            bonusLista.push({ x: x, y: y,
