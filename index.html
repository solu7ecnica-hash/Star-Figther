<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Fighter - Ferratech Jogos</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WHGRWM2R8F"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WHGRWM2R8F');
    </script>

    <style>
        .bg-photo-overlay, .bg-photo-container, .centered-top-placeholder, 
        .centered-top-container, header, .skip-navigation, .sidebar-container {
            display: none !important; height: 0 !important; padding: 0 !important; margin: 0 !important;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif;
        }
        .caixa-jogo-fixa {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100vh !important;
            background-color: #05050a !important;
            z-index: 999999 !important; display: flex !important;
            justify-content: center !important; align-items: center !important;
        }
        canvas { display: block !important; background-color: #0b0b16 !important; }
    </style>
</head>
<body>

<div class="caixa-jogo-fixa">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // --- 🎨 CARREGAMENTO DOS ASSETS GRÁFICOS ---
    const imgNave = new Image(); imgNave.src = "nave.png"; 
    const imgTiro = new Image(); imgTiro.src = "gosma_verde.png"; 
    const imgBatedor = new Image(); imgBatedor.src = "batedor_1.png"; 
    const imgBatedor2 = new Image(); imgBatedor2.src = "batedor_2.png"; 
    const imgBolaMaldita = new Image(); imgBolaMaldita.src = "bola_maldita.png"; 
    const imgChefao = new Image(); imgChefao.src = "chefao.png"; 
    const imgFundo = new Image(); imgFundo.src = "fundo.jpg"; 
    const imgDengosao = new Image(); imgDengosao.src = "dengosao.png";
    const imgFerrao = new Image(); imgFerrao.src = "ferrao.png";

    // 🪨 Imagens dos Asteroides do Repositório GitHub
    const imgAsteroide1 = new Image(); imgAsteroide1.src = "asteroide1.png";
    const imgAsteroide2 = new Image(); imgAsteroide2.src = "asteroide2.png";
    const imgAsteroide3 = new Image(); imgAsteroide3.src = "asteroide3.png";

    // 🚀 Imagens da Transição da Base Espacial
    const imgCockpit = new Image(); imgCockpit.src = "cockpit.png";
    const imgBase = new Image(); imgBase.src = "base.png";
    const imgSala = new Image(); imgSala.src = "sala.png";

    // --- 🔊 SISTEMA DE ÁUDIO ---
    const audioBum = new Audio("bum.mp3");
    const audioChupa = new Audio("chupa.mp3");
    const audioExplosao = new Audio("explosao.mp3");
    const audioTil = new Audio("til.mp3");

    // --- 📊 CONTROLADORES DE ESTADO ---
    let totalPartidasGerais = parseInt(localStorage.getItem("ferratech_partidas_locais")) || 147;
    let estadoJogo = "START"; 
    let faseAtual = 1; 
    let pontuacao = 0;
    let abates = 0;
    
    const META_CHEFÃO = 50; 
    let countAsteroidesProcessados = 0;
    const META_FIM_ASTEROIDES = 15; 

    // Mecânica do Boss
    let bossAtivo = false; 
    let bossMorrendo = false; 
    let tempoMorteBoss = 0;
    const chefaoObj = { x: 0, y: -150, largura: 160, altura: 120, vidaMax: 50, vida: 50, velX: 3, direcao: 1 };

    // Efeitos e Transições Cinematográficas
    let escalaBasePouso = 0.05; 
    let rotaEscolhidaPorJogador = "";
    let decolagemTamanhoNave = 180; 
    let decolagemOpacidadeBrilho = 0; 
    let decolagemY = 0;
    let tremorCena = 0;

    // Entidade do Jogador
    const x_jogador = { 
        x: 0, y: 0, largura: 55, altura: 55, velocidad: 7,
        movendoEsquerda: false, movendoDireita: false, movendoCima: false, movendoBaixo: false,
        vidaMax: 10, vida: 10
    };

    const cenario = { y1: 0, y2: 0, velocidad: 3.5 };
    
    // Arrays de Gerenciamento de Entidades
    const tiros = []; 
    const batedores = []; 
    const bolasMalditas = []; 
    const ferroesInimigos = []; 
    const asteroides = [];
    const explosoes = [];

    // Controles Layout Mobile
    const painel = {
        y: 0, altura: 150,
        btnEsq: { x: 15, y: 0, l: 50, a: 50 }, btnDir: { x: 115, y: 0, l: 50, a: 50 },
        btnCima: { x: 65, y: 0, l: 50, a: 50 }, btnBaixo: { x: 65, y: 0, l: 50, a: 50 },
        btnAtirar: { x: 0, y: 0, raio: 40 }, btnIniciar: { x: 0, y: 0, l: 180, a: 50 },
        btnAlpha: { x: 0, y: 0, l: 240, a: 40 },
        btnPegasus: { x: 0, y: 0, l: 240, a: 40 },
        btnOrion: { x: 0, y: 0, l: 240, a: 40 }
    };

    function configurarPainel() {
        painel.y = canvas.height - painel.altura;
        cenario.y2 = -canvas.height;
        painel.btnCima.y = painel.y + 10; painel.btnEsq.y = painel.y + 50; painel.btnDir.y = painel.y + 50; painel.btnBaixo.y = painel.y + 90;
        painel.btnAtirar.x = canvas.width - painel.btnAtirar.raio - 20; painel.btnAtirar.y = painel.y + (painel.altura / 2);
        painel.btnIniciar.x = canvas.width / 2 - painel.btnIniciar.l / 2; painel.btnIniciar.y = canvas.height / 2 + 60;

        painel.btnAlpha.x = canvas.width / 2 - painel.btnAlpha.l / 2; painel.btnAlpha.y = canvas.height / 2 - 20;
        painel.btnPegasus.x = canvas.width / 2 - painel.btnPegasus.l / 2; painel.btnPegasus.y = canvas.height / 2 + 30;
        painel.btnOrion.x = canvas.width / 2 - painel.btnOrion.l / 2; painel.btnOrion.y = canvas.height / 2 + 80;

        if (x_jogador.x === 0 || x_jogador.y === 0) {
            x_jogador.x = canvas.width / 2 - x_jogador.largura / 2; x_jogador.y = painel.y - x_jogador.altura - 30;
        }
    }

    function ajustarTela() {
        let larguraJanela = window.innerWidth; let alturaJanela = window.innerHeight;
        canvas.height = alturaJanela; canvas.width = alturaJanela * (9 / 16);
        if (canvas.width > larguraJanela) { canvas.width = larguraJanela; canvas.height = larguraJanela * (16 / 9); }
        configurarPainel();
    }

    function registrarNovaPartida() {
        totalPartidasGerais++; localStorage.setItem("ferratech_partidas_locais", totalPartidasGerais);
        if (typeof gtag === 'function') { gtag('event', 'partida_iniciada', { 'value': totalPartidasGerais }); }
    }

    function reiniciarJogo() {
        registrarNovaPartida();
        pontuacao = 0; abates = 0; faseAtual = 1; countAsteroidesProcessados = 0; escalaBasePouso = 0.05;
        decolagemTamanhoNave = 180; decolagemOpacidadeBrilho = 0; bossAtivo = false; bossMorrendo = false;
        chefaoObj.vida = chefaoObj.vidaMax; chefaoObj.y = -150;
        x_jogador.vida = x_jogador.vidaMax; 
        tiros.length = 0; asteroides.length = 0; batedores.length = 0; bolasMalditas.length = 0; ferroesInimigos.length = 0; explosoes.length = 0;
        estadoJogo = "JOGANDO";
    }

    function verificarColisao(a, b) {
        return a.x < b.x + b.largura && a.x + a.largura > b.x && a.y < b.y + b.altura && a.y + a.altura > b.y;
    }

    // --- DETECÇÃO DE TOQUES E CLIQUES ---
    canvas.addEventListener("touchstart", e => {
        const rect = canvas.getBoundingClientRect(); const t = e.changedTouches[0];
        const tx = t.clientX - rect.left; const ty = t.clientY - rect.top;

        if (estadoJogo === "START") {
            if (tx >= painel.btnIniciar.x && tx <= painel.btnIniciar.x + painel.btnIniciar.l && ty >= painel.btnIniciar.y && ty <= painel.btnIniciar.y + painel.btnIniciar.a) {
                reiniciarJogo();
            }
            return;
        }

        if (estadoJogo === "GAMEOVER" || estadoJogo === "VITORIA") {
            if (tx >= canvas.width / 2 - 80 && tx <= canvas.width / 2 + 80 && ty >= canvas.height - 110 && ty <= canvas.height - 70) {
                window.open("https://forms.gle/SEU_LINK_DO_FORMULARIO", "_blank");
                return;
            }
            estadoJogo = "START"; 
            return; 
        }

        if (estadoJogo === "SALA_COMANDO") {
            decolagemY = canvas.height - 200;
            if (tx >= painel.btnAlpha.x && tx <= painel.btnAlpha.x + painel.btnAlpha.l && ty >= painel.btnAlpha.y && ty <= painel.btnAlpha.y + painel.btnAlpha.a) {
                rotaEscolhidaPorJogador = "ALPHA CENTAURI"; estadoJogo = "DECOLAGEM";
            }
            if (tx >= painel.btnPegasus.x && tx <= painel.btnPegasus.x + painel.btnPegasus.l && ty >= painel.btnPegasus.y && ty <= painel.btnPegasus.y + painel.btnPegasus.a) {
                rotaEscolhidaPorJogador = "QUADRANTE PEGASUS"; estadoJogo = "DECOLAGEM";
            }
            if (tx >= painel.btnOrion.x && tx <= painel.btnOrion.x + painel.btnOrion.l && ty >= painel.btnOrion.y && ty <= painel.btnOrion.y + painel.btnOrion.a) {
                rotaEscolhidaPorJogador = "NEBULOSA DE ORION"; estadoJogo = "DECOLAGEM";
            }
            return;
        }

        let d = Math.sqrt(Math.pow(tx - painel.btnAtirar.x, 2) + Math.pow(ty - painel.btnAtirar.y, 2));
        if (d <= painel.btnAtirar.raio && estadoJogo === "JOGANDO") {
            tiros.push({ x: x_jogador.x + x_jogador.largura/2 - 5, y: x_jogador.y - 25, largura: 10, altura: 25, vel: 14 });
            if(audioTil.readyState >= 2) audioTil.cloneNode().play().catch(()=>{});
        }
        processarMovimentoTouch(e);
    }, { passive: false });

    function processarMovimentoTouch(e) {
        if (estadoJogo !== "JOGANDO") return;
        const rect = canvas.getBoundingClientRect();
        x_jogador.movendoEsquerda = false; x_jogador.movendoDireita = false; x_jogador.movendoCima = false; x_jogador.movendoBaixo = false;
        for (let i = 0; i < e.touches.length; i++) {
            const t = e.touches[i]; const tx = t.clientX - rect.left; const ty = t.clientY - rect.top;
            if (tx >= painel.btnEsq.x && tx <= painel.btnEsq.x + painel.btnEsq.l && ty >= painel.btnEsq.y && ty <= painel.btnEsq.y + painel.btnEsq.a) x_jogador.movendoEsquerda = true;
            if (tx >= painel.btnDir.x && tx <= painel.btnDir.x + painel.btnDir.l && ty >= painel.btnDir.y && ty <= painel.btnDir.y + painel.btnDir.a) x_jogador.movendoDireita = true;
            if (tx >= painel.btnCima.x && tx <= painel.btnCima.x + painel.btnCima.l && ty >= painel.btnCima.y && ty <= painel.btnCima.y + painel.btnCima.a) x_jogador.movendoCima = true;
            if (tx >= painel.btnBaixo.x && tx <= painel.btnBaixo.x + painel.btnBaixo.l && ty >= painel.btnBaixo.y && ty <= painel.btnBaixo.y + painel.btnBaixo.a) x_jogador.movendoBaixo = true;
        }
    }
    canvas.addEventListener("touchmove", processarMovimentoTouch, { passive: false });
    canvas.addEventListener("touchend", processarMovimentoTouch, { passive: false });

    // --- MOTOR DE PROCESSAMENTO DE LÓGICA ---
    function atualizar(ts) {
        if (estadoJogo === "POUSO_BASE") {
            if (escalaBasePouso < 1.0) escalaBasePouso += 0.0035;
            else estadoJogo = "SALA_COMANDO";
            return;
        }

        if (estadoJogo === "DECOLAGEM") {
            decolagemY -= 5;
            if (decolagemTamanhoNave > 1) {
                decolagemTamanhoNave -= 1.6;
                decolagemOpacidadeBrilho = Math.min(1, decolagemOpacidadeBrilho + 0.02);
            } else {
                estadoJogo = "VITORIA";
            }
            return;
        }

        if (estadoJogo !== "JOGANDO") return;

        // Movimentação do Fundo Espacial
        cenario.y1 += cenario.velocidade; cenario.y2 += cenario.velocidade;
        if (cenario.y1 >= canvas.height) cenario.y1 = -canvas.height;
        if (cenario.y2 >= canvas.height) cenario.y2 = -canvas.height;

        // Movimentação da Nave do Jogador
        if (x_jogador.movendoEsquerda && x_jogador.x > 0) x_jogador.x -= x_jogador.velocidad;
        if (x_jogador.movendoDireita && x_jogador.x < canvas.width - x_jogador.largura) x_jogador.x += x_jogador.velocidad;
        if (x_jogador.movendoCima && x_jogador.y > 0) x_jogador.y -= x_jogador.velocidad;
        if (x_jogador.movendoBaixo && x_jogador.y < painel.y - x_jogador.altura) x_jogador.y += x_jogador.velocidad;

        // --- MÁQUINA DE FLUXO DE FASES INTERNAS ---
        if (abates >= META_CHEFÃO && !bossAtivo && faseAtual < 4) {
            bossAtivo = true;
            if(audioChupa.readyState >= 2) audioChupa.play().catch(()=>{});
        }

        // Sistema Intermediário de Inimigos (Fases 1, 2 e 3)
        if (!bossAtivo && faseAtual < 4) {
            if (Math.random() < 0.03 && batedores.length < 4) {
                batedores.push({ x: Math.random()*(canvas.width-45), y: -50, largura: 45, altura: 45, velY: 3, tipo: Math.random() > 0.5 ? 1 : 2 });
            }
            if (faseAtual >= 2 && Math.random() < 0.015 && bolasMalditas.length < 2) {
                bolasMalditas.push({ x: Math.random()*(canvas.width-40), y: -45, largura: 40, altura: 40, velY: 4, velX: Math.random() > 0.5 ? 2 : -2 });
            }
            if (faseAtual === 3 && Math.random() < 0.02) {
                // Inimigo Dengosão Atira Ferrão
                batedores.forEach(b => {
                    if (Math.random() < 0.2) ferroesInimigos.push({ x: b.x + 20, y: b.y + 40, largura: 8, altura: 20, velY: 6 });
                });
            }
        }

        // LÓGICA EXCLUSIVA DA FASE 4 (ASTEROIDES GITHUB)
        if (faseAtual === 4 && asteroides.length < 4 && countAsteroidesProcessados < META_FIM_ASTEROIDES) {
            let sorteio = Math.random();
            let tipoAst = "1"; let tam = 42;
            if (sorteio > 0.75) { tipoAst = "3"; tam = 68; }
            else if (sorteio > 0.45) { tipoAst = "2"; tam = 52; }
            asteroides.push({ tipo: tipoAst, x: Math.random()*(canvas.width - tam), y: -70, largura: tam, altura: tam, velY: 3.8 });
        }

        // Inteligência e Movimentação do Chefão (Boss)
        if (bossAtivo && !bossMorrendo) {
            if (chefaoObj.y < 60) chefaoObj.y += 2;
            chefaoObj.x += chefaoObj.velX * chefaoObj.direcao;
            if (chefaoObj.x <= 10 || chefaoObj.x >= canvas.width - chefaoObj.largura - 10) {
                chefaoObj.direcao *= -1;
            }
            if (Math.random() < 0.05) {
                ferroeisInimigos.push({ x: chefaoObj.x + chefaoObj.largura/2, y: chefaoObj.y + chefaoObj.altura, largura: 12, altura: 25, velY: 7 });
            }
        }

        // --- PROCESSAMENTO DE COLISÕES ---
        // Queda dos Inimigos Comuns
        batedores.forEach((b, idx) => {
            b.y += b.velY;
            if (verificarColisao(b, x_jogador)) { x_jogador.vida--; batedores.splice(idx, 1); if(audioBum.readyState >= 2) audioBum.play().catch(()=>{}); }
            if (b.y > painel.y) batedores.splice(idx, 1);
        });

        bolasMalditas.forEach((b, idx) => {
            b.y += b.velY; b.x += b.velX;
            if (b.x <= 0 || b.x >= canvas.width - b.largura) b.velX *= -1;
            if (verificarColisao(b, x_jogador)) { x_jogador.vida -= 2; bolasMalditas.splice(idx, 1); }
            if (b.y > painel.y) bolasMalditas.splice(idx, 1);
        });

        ferroesInimigos.forEach((f, idx) => {
            f.y += f.velY;
            if (verificarColisao(f, x_jogador)) { x_jogador.vida--; ferroesInimigos.splice(idx, 1); }
            if (f.y > painel.y) ferroesInimigos.splice(idx, 1);
        });

        // Movimento dos Asteroides (Fase 4)
        for (let i = asteroides.length - 1; i >= 0; i--) {
            asteroides[i].y += asteroides[i].velY;
            if (verificarColisao(asteroides[i], x_jogador)) {
                x_jogador.vida -= 2; asteroides.splice(i, 1);
                if(audioBum.readyState >= 2) audioBum.cloneNode().play().catch(()=>{});
                if (x_jogador.vida <= 0) estadoJogo = "GAMEOVER";
                continue;
            }
            if (asteroides[i].y > painel.y) asteroides.splice(i, 1);
        }

        // Movimentação e Validação do Destino dos Tiros
        for (let i = tiros.length - 1; i >= 0; i--) {
            tiros[i].y -= tiros[i].vel;
            let tiroRemovido = false;

            // Impacto nos Asteroides
            for (let j = asteroides.length - 1; j >= 0; j--) {
                if (verificarColisao(tiros[i], asteroides[j])) {
                    asteroides.splice(j, 1); tiroRemovido = true;
                    countAsteroidesProcessados++; pontuacao += 150;
                    if(audioExplosao.readyState >= 2) audioExplosao.cloneNode().play().catch(()=>{});
                    break;
                }
            }
            if (tiroRemovido) { tiros.splice(i, 1); continue; }

            // Impacto nos Batedores Comuns
            for (let k = batedores.length - 1; k >= 0; k--) {
                if (verificarColisao(tiros[i], batedores[k])) {
                    batedores.splice(k, 1); tiroRemovido = true; abates++; pontuacao += 100;
                    break;
                }
            }
            if (tiroRemovido) { tiros.splice(i, 1); continue; }

            // Impacto no Boss
            if (bossAtivo && !bossMorrendo && verificarColisao(tiros[i], chefaoObj)) {
                chefaoObj.vida--; tiroRemovido = true;
                if (chefaoObj.vida <= 0) {
                    bossMorrendo = true; faseAtual = 4; bossAtivo = false; // Avança para a barreira de asteroides
                }
                tiros.splice(i, 1); continue;
            }

            if (tiros[i].y < 0) tiros.splice(i, 1);
        }

        if (x_jogador.vida <= 0) estadoJogo = "GAMEOVER";

        // Transição direta da Fase de Asteroides terminada para a Base Espacial
        if (faseAtual === 4 && countAsteroidesProcessados >= META_FIM_ASTEROIDES && asteroides.length === 0) {
            estadoJogo = "POUSO_BASE"; escalaBasePouso = 0.05;
        }
    }

    // --- MOTOR GRÁFICO (RENDER DO CANVAS) ---
    function desenhar() {
        ctx.fillStyle = "#05050d"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (estadoJogo === "JOGANDO" || estadoJogo === "START" || estadoJogo === "DECOLAGEM") {
            if (imgFundo.complete) {
                ctx.drawImage(imgFundo, 0, cenario.y1, canvas.width, canvas.height);
                ctx.drawImage(imgFundo, 0, cenario.y2, canvas.width, canvas.height);
            }
        }

        if (estadoJogo === "JOGANDO") {
            // Desenho dos Inimigos Clássicos das primeiras fases
            batedores.forEach(b => {
                let imgB = b.tipo === 1 ? imgBatedor : imgBatedor2;
                if (imgB.complete) ctx.drawImage(imgB, b.x, b.y, b.largura, b.altura);
            });

            bolasMalditas.forEach(b => {
                if (imgBolaMaldita.complete) ctx.drawImage(imgBolaMaldita, b.x, b.y, b.largura, b.altura);
            });

            ferroesInimigos.forEach(f => {
                ctx.fillStyle = "#ff0055"; ctx.fillRect(f.x, f.y, f.largura, f.altura);
            });

            // Render das Fotos dos Asteroides (GitHub)
            asteroides.forEach(ast => {
                if (ast.tipo === "3" && imgAsteroide3.complete) ctx.drawImage(imgAsteroide3, ast.x, ast.y, ast.largura, ast.altura);
                else if (ast.tipo === "2" && imgAsteroide2.complete) ctx.drawImage(imgAsteroide2, ast.x, ast.y, ast.largura, ast.altura);
                else if (imgAsteroide1.complete) ctx.drawImage(imgAsteroide1, ast.x, ast.y, ast.largura, ast.altura);
            });

            // Render do Grande Boss
            if (bossAtivo && imgChefao.complete) {
                ctx.drawImage(imgChefao, chefaoObj.x, chefaoObj.y, chefaoObj.largura, chefaoObj.altura);
                // Barra de Energia do Boss
                ctx.fillStyle = "#ffcc00"; ctx.fillRect(canvas.width/2 - 60, 10, (chefaoObj.vida/chefaoObj.vidaMax)*120, 6);
            }

            // Tiros e Nave do Piloto
            tiros.forEach(t => { if(imgTiro.complete) ctx.drawImage(imgTiro, t.x, t.y, t.largura, t.altura); else { ctx.fillStyle = "#00ffcc"; ctx.fillRect(t.x, t.y, t.largura, t.altura); } });
            if (imgNave.complete) ctx.drawImage(imgNave, x_jogador.x, x_jogador.y, x_jogador.largura, x_jogador.altura);

            // Barra de Escudo da Nave
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(15, 15, 110, 10);
            ctx.fillStyle = "#00ffaa"; ctx.fillRect(15, 15, (x_jogador.vida / x_jogador.vidaMax) * 110, 10);
        }

        // 🎬 TELAS DE TRANSIÇÃO DA BASE ESPACIAL
        if (estadoJogo === "POUSO_BASE") {
            if (imgBase.complete) {
                let lb = canvas.width * escalaBasePouso; let ab = canvas.height * escalaBasePouso;
                ctx.drawImage(imgBase, canvas.width/2 - lb/2, canvas.height/2 - ab/2, lb, ab);
            }
            if (imgCockpit.complete) ctx.drawImage(imgCockpit, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("APROXIMAÇÃO DE SEGURANÇA: BASE S.H.", canvas.width / 2, 45);
        }

        if (estadoJogo === "SALA_COMANDO") {
            if (imgSala.complete) ctx.drawImage(imgSala, 0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(5, 10, 30, 0.85)"; ctx.fillRect(15, 30, canvas.width - 30, canvas.height / 2 - 50);
            ctx.fillStyle = "#00ffcc"; ctx.font = "bold 15px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("S.H. FERRATECH - SELECIONE A MISSÃO", canvas.width / 2, 65);

            ctx.fillStyle = "rgba(0, 180, 255, 0.4)"; ctx.fillRect(painel.btnAlpha.x, painel.btnAlpha.y, painel.btnAlpha.l, painel.btnAlpha.a);
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif"; ctx.fillText("🛡️ MISSÃO ALPHA CENTAURI", canvas.width / 2, painel.btnAlpha.y + 24);

            ctx.fillStyle = "rgba(150, 0, 255, 0.4)"; ctx.fillRect(painel.btnPegasus.x, painel.btnPegasus.y, painel.btnPegasus.l, painel.btnPegasus.a);
            ctx.fillStyle = "#fff"; ctx.fillText("⚡ MISSÃO QUADRANTE PEGASUS", canvas.width / 2, painel.btnPegasus.y + 24);

            ctx.fillStyle = "rgba(255, 100, 0, 0.4)"; ctx.fillRect(painel.btnOrion.x, painel.btnOrion.y, painel.btnOrion.l, painel.btnOrion.a);
            ctx.fillStyle = "#fff"; ctx.fillText("🌌 MISSÃO NEBULOSA DE ORION", canvas.width / 2, painel.btnOrion.y + 24);
        }

        if (estadoJogo === "DECOLAGEM") {
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            for(let i=0; i<8; i++){ ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 35); }
            if (imgNave.complete) {
                let nx = canvas.width / 2 - decolagemTamanhoNave / 2;
                ctx.drawImage(imgNave, nx, decolagemY, decolagemTamanhoNave, decolagemTamanhoNave);
                if (decolagemTamanhoNave < 40) {
                    ctx.shadowBlur = 20; ctx.shadowColor = "#00ffff";
                    ctx.fillStyle = rgba(255, 255, 255, ${decolagemOpacidadeBrilho});
                    ctx.beginPath(); ctx.arc(canvas.width/2, decolagemY + (decolagemTamanhoNave/2), decolagemTamanhoNave*0.4, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
            ctx.fillStyle = "#00ffcc"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
            ctx.fillText(AVANTE PARA ${rotaEscolhidaPorJogador}!, canvas.width / 2, 80);
        }

        // HUD Dos Botões de Controle (Modo JOGANDO)
        if (estadoJogo === "JOGANDO") {
            ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("▲", painel.btnCima.x + 25, painel.btnCima.y + 25);
            ctx.fillText("◀️", painel.btnEsq.x + 25, painel.btnEsq.y + 25);
            ctx.fillText("▶️", painel.btnDir.x + 25, painel.btnDir.y + 25);
            ctx.fillText("▼", painel.btnBaixo.x + 25, painel.btnBaixo.y + 25);
            ctx.fillStyle = "rgba(255, 0, 70, 0.6)"; ctx.beginPath(); ctx.arc(painel.btnAtirar.x, painel.btnAtirar.y, painel.btnAtirar.raio, 0, Math.PI*2); ctx.fill();
        }

        if (estadoJogo === "START") {
            ctx.fillStyle = "rgba(5, 5, 15, 0.95)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00d2ff"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("FERRATECH JOGOS", canvas.width / 2, canvas.height / 2 - 80);
            ctx.fillStyle = "#ffcc00"; ctx.font = "bold 13px sans-serif";
            ctx.fillText("⚡ " + totalPartidasGerais + " PARTIDAS JOGADAS EM GOIÁS!", canvas.width / 2, canvas.height / 2 - 10);
            ctx.fillStyle = "#00ffcc"; ctx.fillRect(painel.btnIniciar.x, painel.btnIniciar.y, painel.btnIniciar.l, painel.btnIniciar.a);
            ctx.fillStyle = "#000"; ctx.font = "bold 16px sans-serif"; ctx.fillText("INICIAR JOGO", canvas.width / 2, painel.btnIniciar.y + 25);
        }

        if (estadoJogo === "GAMEOVER") {
            ctx.fillStyle = "rgba(20, 5, 5, 0.95)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0055"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("FIM DE JOGO", canvas.width / 2, canvas.height / 2 - 60);
            
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(canvas.width / 2 - 80, canvas.height - 110, 160, 40);
            ctx.fillStyle = "#000"; ctx.font = "bold 12px sans-serif"; ctx.fillText("💬 DAR FEEDBACK", canvas.width / 2, canvas.height - 86);
        }

        if (estadoJogo === "VITORIA") {
            ctx.fillStyle = "rgba(5, 25, 20, 0.95)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("MISSÃO INICIADA!", canvas.width / 2, canvas.height / 2 - 60);
            ctx.fillStyle = "#fff"; ctx.font = "14px sans-serif"; ctx.fillText(Rota: ${rotaEscolhidaPorJogador}, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(canvas.width / 2 - 80, canvas.height - 110, 160, 40);
            ctx.fillStyle = "#000"; ctx.font = "bold 12px sans-serif"; ctx.fillText("💬 DAR FEEDBACK", canvas.width / 2, canvas.height - 86);
        }
    }

    function loop(timestamp) {
        atualizar(timestamp || performance.now());
        desenhar();
        requestAnimationFrame(loop);
    }

    ajustarTela();
    window.addEventListener("resize", ajustarTela);
    requestAnimationFrame(loop);
</script>
</body>
</html>
